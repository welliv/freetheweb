<section id="contact" class="py-24 lg:py-32 relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-brand-dark to-brand-dark"></div>
  <div class="absolute inset-0 flex items-center justify-center">
    <div class="w-[600px] h-[600px] rounded-full blur-3xl" style="background: {{PRIMARY_COLOR}}08"></div>
  </div>
  <div class="relative z-10 max-w-2xl mx-auto text-center px-6">
    <p class="fade-up text-xs tracking-[0.3em] uppercase mb-4" style="color: {{PRIMARY_COLOR}}">Join the Inner Circle</p>
    <h2 class="fade-up font-serif text-4xl lg:text-6xl font-light mb-6" style="transition-delay: 0.1s">{{CTA_HEADLINE}}</h2>
    <p class="fade-up text-brand-muted text-base font-light mb-10 max-w-md mx-auto" style="transition-delay: 0.2s">{{CTA_SUBTEXT}}</p>
    <form class="fade-up flex flex-col sm:flex-row gap-3 max-w-md mx-auto" style="transition-delay: 0.3s" onsubmit="event.preventDefault(); this.innerHTML='<p class=font-light style=color:{{PRIMARY_COLOR}}>Thank you. Welcome to the inner circle.</p>'">
      <input type="email" placeholder="Your email" required class="flex-1 px-6 py-4 bg-white/5 border border-white/10 text-white text-sm font-light placeholder-brand-muted focus:outline-none focus:border-white/30 transition-colors">
      <button type="submit" class="btn-glow px-8 py-4 text-brand-dark text-sm font-medium tracking-wider uppercase hover:opacity-90 transition-opacity" style="background: {{PRIMARY_COLOR}}">{{CTA_BUTTON_TEXT}}</button>
    </form>
  </div>
</section>
