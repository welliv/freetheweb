<section class="relative min-h-screen flex items-center justify-center overflow-hidden glow">
  <div class="absolute inset-0 bg-gradient-to-b from-brand-dark via-brand-dark to-brand-dark"></div>
  <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full blur-3xl" style="background: {{PRIMARY_COLOR}}08"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full blur-3xl" style="background: {{PRIMARY_COLOR}}05"></div>
  
  <div class="relative z-10 text-center px-6 max-w-5xl mx-auto">
    <p class="fade-up text-sm tracking-[0.3em] uppercase mb-8 font-light" style="color: {{PRIMARY_COLOR}}">{{TAGLINE_BADGE}}</p>
    <h1 class="fade-up font-serif text-5xl sm:text-7xl lg:text-8xl xl:text-9xl font-light leading-[0.9] tracking-tight mb-8" style="transition-delay: 0.1s">
      {{HERO_HEADLINE}}
    </h1>
    <p class="fade-up text-brand-muted text-base sm:text-lg font-light max-w-md mx-auto mb-12 leading-relaxed" style="transition-delay: 0.2s">
      {{HERO_SUBTEXT}}
    </p>
    <div class="fade-up flex flex-col sm:flex-row gap-4 justify-center" style="transition-delay: 0.3s">
      <a href="#collection" class="btn-glow inline-flex items-center justify-center px-10 py-4 text-brand-dark text-sm font-medium tracking-wider uppercase hover:opacity-90 transition-opacity duration-300" style="background: {{PRIMARY_COLOR}}">
        Explore Collection
      </a>
      <a href="#philosophy" class="inline-flex items-center justify-center px-10 py-4 border border-white/20 text-white text-sm font-light tracking-wider uppercase hover:border-white/40 transition-all duration-300">
        Our Story
      </a>
    </div>
  </div>
  
  <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-3">
    <span class="text-[10px] tracking-[0.3em] uppercase text-brand-muted">Scroll</span>
    <div class="w-px h-12 bg-gradient-to-b to-transparent animate-pulse" style="background: linear-gradient(to bottom, {{PRIMARY_COLOR}}80, transparent)"></div>
  </div>
</section>
