<section class="hero pt-32 pb-20 px-4 sm:px-6 lg:px-8" style="background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%)">
  <div class="max-w-7xl mx-auto">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <div>
        <span class="inline-block px-4 py-1.5 rounded-full text-sm font-medium bg-white/20 text-white mb-6">
          {{TAGLINE_BADGE}}
        </span>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight mb-6">
          {{HERO_HEADLINE}}
        </h1>
        <p class="text-lg sm:text-xl text-white/80 mb-8 max-w-lg">
          {{HERO_SUBTEXT}}
        </p>
        <div class="flex flex-wrap gap-4">
          <a href="#products" class="inline-flex items-center px-8 py-4 rounded-full bg-white font-semibold text-lg hover:bg-gray-100 transition shadow-lg" style="color: var(--primary)">
            Shop Now
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </a>
          <a href="#about" class="inline-flex items-center px-8 py-4 rounded-full border-2 border-white/30 text-white font-semibold text-lg hover:bg-white/10 transition">
            Learn More
          </a>
        </div>
      </div>
      <div class="hidden lg:block">
        <div class="relative">
          <div class="absolute inset-0 bg-white/10 rounded-3xl transform rotate-6"></div>
          <img src="{{HERO_IMAGE}}" alt="{{BUSINESS_NAME}}" class="relative rounded-3xl shadow-2xl w-full object-cover aspect-[4/3]">
        </div>
      </div>
    </div>
  </div>
</section>
