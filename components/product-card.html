<div class="fade-up product-card group cursor-pointer" style="transition-delay: 0.1s">
  <div class="relative overflow-hidden bg-brand-card aspect-[3/4] mb-6">
    <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="product-image w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
      <a href="{{STRIPE_PAYMENT_LINK}}" target="_blank" class="btn-glow block w-full py-3 text-brand-dark text-sm font-medium tracking-wider uppercase text-center hover:opacity-90 transition-opacity" style="background: {{PRIMARY_COLOR}}">
        Purchase — {{PRODUCT_PRICE}}
      </a>
    </div>
    {{BADGE}}
  </div>
  <h3 class="font-serif text-xl lg:text-2xl font-light mb-2 group-hover:text-white transition-colors duration-300">{{PRODUCT_NAME}}</h3>
  <p class="text-brand-muted text-sm font-light">{{PRODUCT_DESCRIPTION}}</p>
  <p class="font-light mt-2" style="color: {{PRIMARY_COLOR}}">{{PRODUCT_PRICE}}</p>
</div>
