<div class="product-card group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300">
  <div class="relative overflow-hidden aspect-square bg-gray-100">
    <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
    {{BADGE}}
  </div>
  <div class="p-5">
    <h3 class="font-semibold text-gray-900 text-lg mb-1">{{PRODUCT_NAME}}</h3>
    <p class="text-sm text-gray-500 mb-3">{{PRODUCT_DESCRIPTION}}</p>
    <div class="flex items-center justify-between">
      <span class="text-xl font-bold" style="color: var(--primary)">{{PRODUCT_PRICE}}</span>
      <a href="{{STRIPE_PAYMENT_LINK}}" target="_blank" class="inline-flex items-center px-5 py-2.5 rounded-full text-sm font-semibold text-white hover:opacity-90 transition" style="background: var(--primary)">
        Buy Now
        <svg class="w-4 h-4 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
        </svg>
      </a>
    </div>
  </div>
</div>
